<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Wizard Multiplayer</title>
    <meta name="theme-color" content="#0e1a38" />
    <script>
      // Paired with public/404.html: unpack the ?p=/room/ABCD hop back into
      // history before React Router boots, so deep links survive GH Pages.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            '',
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
